name: Update Latest Podcast Episode

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch latest episode and update README
        env:
          RSS_URL: ${{ secrets.PODCAST_RSS_URL }}
        run: |
          python3 - <<'PYEOF'
          import feedparser, re, os, sys

          rss_url = os.environ.get("RSS_URL", "").strip()

          if not rss_url:
              print("HATA: PODCAST_RSS_URL secret bulunamadi!")
              sys.exit(1)

          print(f"RSS okunuyor: {rss_url}")
          feed = feedparser.parse(rss_url)

          if not feed.entries:
              print("HATA: RSS feed bos veya erisemiyor!")
              print(f"Feed status: {feed.get('status', 'bilinmiyor')}")
              sys.exit(1)

          ep   = feed.entries[0]
          name = ep.get("title", "Yeni Bölüm")
          url  = ep.get("link", "https://open.spotify.com/show/033E11AlTP5udHIqs2RULD")
          raw_date = ep.get("published", "")
          date = raw_date[:16] if raw_date else ""
          summary = ep.get("summary", "")
          desc = (summary[:150].rstrip() + "...") if summary else ""

          print(f"Bolum: {name}")
          print(f"Tarih: {date}")

          block = (
              "<!-- PODCAST:START -->\n"
              '<p align="center">\n'
              f"  <b>🎧 {name}</b><br/>\n"
              f"  <i>📅 {date}</i><br/><br/>\n"
              f"  <i>{desc}</i><br/><br/>\n"
              f'  <a href="{url}" target="_blank">\n'
              '    <img height="34" src="https://img.shields.io/badge/%C5%9Eimdi%20Dinle-1DB954?style=for-the-badge&logo=spotify&logoColor=white" />\n'
              "  </a>\n"
              "</p>\n"
              "<!-- PODCAST:END -->"
          )

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_content = re.sub(
              r"<!-- PODCAST:START -->.*?<!-- PODCAST:END -->",
              block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print("README basariyla guncellendi!")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🎙️ Son podcast bölümü güncellendi"
          git push
