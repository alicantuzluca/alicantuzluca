name: Update Latest Podcast Episode

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch latest episode and update README
        env:
          RSS_URL: ${{ secrets.PODCAST_RSS_URL }}
        run: |
          python3 - <<'PYEOF'
          import feedparser, re, os, sys, html
          from datetime import datetime

          rss_url = os.environ.get("RSS_URL", "").strip()
          if not rss_url:
              print("HATA: PODCAST_RSS_URL secret bulunamadi!")
              sys.exit(1)

          print(f"RSS okunuyor: {rss_url}")
          feed = feedparser.parse(rss_url)

          if not feed.entries:
              print("HATA: RSS feed bos veya erisemiyor!")
              sys.exit(1)

          ep   = feed.entries[0]
          name = ep.get("title", "Yeni Bolum")
          url  = ep.get("link", "https://open.spotify.com/show/033E11AlTP5udHIqs2RULD")

          # Tarihi Turkce formatina cevir
          raw_date = ep.get("published", "")
          try:
              dt = datetime.strptime(raw_date[:16].strip(), "%a, %d %b %Y")
              months = ["Ocak","Subat","Mart","Nisan","Mayis","Haziran",
                        "Temmuz","Agustos","Eylul","Ekim","Kasim","Aralik"]
              date = f"{dt.day} {months[dt.month-1]} {dt.year}"
          except:
              date = raw_date[:16]

          # HTML taglerini temizle, sade metin al
          raw_summary = ep.get("summary", "")
          clean = re.sub(r"<[^>]+>", "", raw_summary)
          clean = html.unescape(clean).strip()
          lines = [l.strip() for l in clean.splitlines() if l.strip()]
          desc_lines = [l for l in lines if not l.startswith("Bolum") and "|" not in l[:30]]
          desc = " ".join(desc_lines)[:160].rstrip() + "..." if desc_lines else ""

          print(f"Bolum: {name}")
          print(f"Tarih: {date}")
          print(f"Ozet: {desc}")

          block = (
              "<!-- PODCAST:START -->\n"
              '<p align="center">\n'
              f"  <b>🎧 {name}</b><br/>\n"
              f"  <i>📅 {date}</i><br/><br/>\n"
              f"  <i>{desc}</i><br/><br/>\n"
              f'  <a href="{url}" target="_blank">'
              '<img height="34" src="https://img.shields.io/badge/%C5%9Eimdi%20Dinle-1DB954?style=for-the-badge&logo=spotify&logoColor=white" /></a>'
              "&nbsp;"
              '<a href="https://open.spotify.com/show/033E11AlTP5udHIqs2RULD" target="_blank">'
              '<img height="34" src="https://img.shields.io/badge/T%C3%BCm%20B%C3%B6l%C3%BCmler-222222?style=for-the-badge&logo=spotify&logoColor=white" /></a>\n'
              "</p>\n"
              "<!-- PODCAST:END -->"
          )

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_content = re.sub(
              r"<!-- PODCAST:START -->.*?<!-- PODCAST:END -->",
              block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print("README basariyla guncellendi!")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🎙️ Son podcast bölümü güncellendi"
          git push
